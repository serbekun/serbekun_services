<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AES Cipher — Serbekun</title>
    <link rel="stylesheet" href="/static/v0/css/cipher_aes.css">
</head>
<body>

    <div class="container">
        <a href="/" class="back-link">back</a>

        <div class="header">
            <h1 class="header-title">AES Cipher</h1>
            <p class="header-sub">// aes-256-cbc encryption &amp; decryption</p>
        </div>

        <div class="prompt-line">
            <span class="cwd">~/serbekun/cipher</span>
            <span>$</span>
            <span>aes --interactive</span>
            <span class="prompt-cursor"></span>
        </div>

        <!-- Tab bar -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab(0)">encrypt</button>
            <button class="tab-btn" onclick="switchTab(1)">decrypt</button>
        </div>

        <!-- Generate key -->
        <button class="gen-key-btn" onclick="generateKey()">generate new key</button>

        <!-- Encrypt panel -->
        <div id="encryptPanel">
            <div class="field">
                <div class="field-label">plaintext input</div>
                <textarea id="encryptInput" placeholder="enter text to encrypt..."></textarea>
            </div>
            <div class="field">
                <div class="field-label">aes key (base64)</div>
                <div class="key-wrap">
                    <input type="text" id="encryptKey" placeholder="generate or paste a key..." spellcheck="false">
                    <button class="key-action-btn" onclick="copyKey('encryptKey')">copy</button>
                    <button class="key-action-btn" onclick="downloadKey('encryptKey')">save</button>
                </div>
            </div>
            <button class="run-btn" onclick="encryptData()">run encrypt</button>
            <div id="encryptResult" class="result-block">
                <div class="result-header">
                    <span class="result-label">output</span>
                    <button class="copy-btn" onclick="copyResult('encryptResultText', this)">copy</button>
                </div>
                <div class="result-body" id="encryptResultText"></div>
            </div>
        </div>

        <!-- Decrypt panel -->
        <div id="decryptPanel">
            <div class="field">
                <div class="field-label">ciphertext input (base64)</div>
                <textarea id="decryptInput" placeholder="paste encrypted data..."></textarea>
            </div>
            <div class="field">
                <div class="field-label">aes key (base64)</div>
                <div class="key-wrap">
                    <input type="text" id="decryptKey" placeholder="enter the key..." spellcheck="false">
                    <button class="key-action-btn" onclick="copyKey('decryptKey')">copy</button>
                    <button class="key-action-btn" onclick="downloadKey('decryptKey')">save</button>
                </div>
            </div>
            <button class="run-btn" onclick="decryptData()">run decrypt</button>
            <div id="decryptResult" class="result-block">
                <div class="result-header">
                    <span class="result-label">output</span>
                    <button class="copy-btn" onclick="copyResult('decryptResultText', this)">copy</button>
                </div>
                <div class="result-body" id="decryptResultText"></div>
            </div>
        </div>

        <div class="status-line" id="status"></div>

        <div class="footer">serbekun service // aes cipher</div>
    </div>
    <script src="/static/v0/js/cipher_aes.js"></script>
</body>
</html>
