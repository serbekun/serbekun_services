<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LINKS CATALOG</title>
    <link rel="stylesheet" href="/static/v0/css/links.css">
</head>
<body>
    <a href="/" style="position:fixed;top:16px;left:16px;z-index:9999;background:rgba(20,20,20,0.9);color:#aaa;border:1px solid #444;border-radius:999px;padding:6px 14px;font-size:0.85rem;text-decoration:none;box-shadow:0 4px 12px #000;">← Back</a>
    <div class="container">
        <h1>LINKS CATALOG</h1>
        <div class="subhead">manage your links collection</div>

        <!-- TOKEN INPUT SECTION -->
        <div class="token-section">
            <label for="manualToken">Access Token:</label>
            <div class="token-input-wrap">
                <input type="text" id="manualToken" placeholder="Paste your token here..." spellcheck="false">
                <button class="token-apply-btn" onclick="applyToken()">Apply</button>
            </div>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab(0)">View Links</button>
            <button class="tab-btn" onclick="switchTab(1)">Add Link</button>
            <button class="tab-btn" onclick="switchTab(2)" id="editBtn" style="display:none;">Edit Link</button>
        </div>

        <div id="viewTab">
            <div class="links-list" id="linksList">
                <!-- Links will be loaded here -->
            </div>
        </div>

        <div id="addTab">
            <label>Link URL</label>
            <input type="url" id="addUrl" placeholder="https://example.com" spellcheck="false">

            <label>Link Name</label>
            <input type="text" id="addName" placeholder="My Awesome Link" spellcheck="false">

            <label>Description</label>
            <textarea id="addDescription" placeholder="Brief description of the link..."></textarea>

            <button class="btn-primary" onclick="addLink()">Add Link</button>
        </div>

        <div id="editTab">
            <input type="hidden" id="editUuid">

            <label>Link URL</label>
            <input type="url" id="editUrl" placeholder="https://example.com" spellcheck="false">

            <label>Link Name</label>
            <input type="text" id="editName" placeholder="My Awesome Link" spellcheck="false">

            <label>Description</label>
            <textarea id="editDescription" placeholder="Brief description of the link..."></textarea>

            <button class="btn-primary" onclick="updateLink()">Update Link</button>
            <button class="btn-secondary" onclick="switchTab(0)">Cancel</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <!-- TOKEN MODAL (hidden by default) -->
    <div id="tokenModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <h2>Your Access Token</h2>
            <p style="color:#ccc; margin-bottom:0.5rem;">This token grants access to edit or delete your link.<br>Keep it safe - it won't be shown again.</p>
            <div class="token-display" id="modalTokenText"></div>
            <div>
                <button class="copy-btn" onclick="copyModalToken()">Copy Token</button>
                <button class="close-modal-btn" onclick="closeTokenModal()">Close</button>
            </div>
            <p class="warning-text" id="modalCopyFeedback"></p>
        </div>
    </div>

    <script src="/static/v0/js/links.js"></script>
</body>
</html>
