<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>YOUTUBE DOWNLOADER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: #0a0a0a;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            color: #ffffff;
            background: #0a0a0a;
            position: relative;
            padding: 1.5rem 1rem 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(2px 2px at 15px 60px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 75px 340px, #ccc, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 280px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 420px 520px, #aaa, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 650px 150px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 820px 380px, #bbb, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 120px 720px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 560px 640px, #eee, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 90% 20%, #ccc, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 20% 90%, #fff, rgba(0,0,0,0));
            background-repeat: no-repeat;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem 2.2rem;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 42px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.85);
            position: relative;
            z-index: 10;
            transition: box-shadow 0.4s ease, border-color 0.3s;
        }

        .container:hover {
            box-shadow: 0 30px 55px -12px #000000cc;
            border-color: rgba(255, 255, 255, 0.3);
        }

        h1 {
            text-align: center;
            font-weight: 600;
            font-size: 2.7rem;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .subhead {
            text-align: center;
            color: #aaaaaa;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            word-spacing: 6px;
        }

        label {
            display: block;
            margin: 24px 0 8px 8px;
            color: #cccccc;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        input[type="url"] {
            width: 100%;
            padding: 16px 18px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.8px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            color: #f0f0f0;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.25s ease;
            box-shadow: 0 8px 12px -6px #00000080;
            line-height: 1.5;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.1);
            background: rgba(20, 20, 20, 0.9);
        }

        input[type="url"]::placeholder {
            color: #888888;
            opacity: 0.8;
            font-size: 0.95rem;
        }

        .video-info {
            margin-top: 28px;
            padding: 20px 22px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            border-left: 6px solid #ffffff;
            box-shadow: 0 10px 25px -5px #000000;
            animation: fadeGlow 0.5s ease-out;
            transition: all 0.2s;
            display: none;
        }

        @keyframes fadeGlow {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 #ffffff; }
            100% { opacity: 1; box-shadow: 0 10px 25px -5px #000; }
        }

        .video-info.error {
            border-left-color: #ff5555;
            box-shadow: 0 0 0 1px #ff5555 inset, 0 10px 20px #300;
        }

        .video-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 14px;
            color: #aaaaaa;
            font-size: 0.9rem;
        }

        .video-meta span {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-description {
            color: #b0b0b0;
            font-size: 0.95rem;
            max-height: 120px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .btn-primary {
            width: 100%;
            padding: 16px 20px;
            margin-top: 28px;
            background: rgba(40, 40, 40, 0.8);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px #000000b0;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
            transform: rotate(25deg);
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px -8px #000;
            border-color: #ffffff;
            background: rgba(60, 60, 60, 0.9);
        }

        .btn-primary:hover::after {
            opacity: 0.5;
        }

        .btn-primary:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px #000000;
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary:disabled:hover {
            transform: none;
            box-shadow: 0 10px 20px -5px #000000b0;
            background: rgba(40, 40, 40, 0.8);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-primary:disabled::after {
            opacity: 0;
        }

        .status {
            text-align: center;
            margin-top: 24px;
            font-size: 1rem;
            font-weight: 500;
            min-height: 28px;
            color: #cccccc;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 550px) {
            .container {
                padding: 1.8rem 1.2rem;
                border-radius: 32px;
            }
            h1 {
                font-size: 2rem;
            }
            .btn-primary {
                font-size: 1.1rem;
                padding: 14px;
            }
            .video-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <a href="/" style="position:fixed;top:16px;left:16px;z-index:9999;background:rgba(20,20,20,0.9);color:#aaa;border:1px solid #444;border-radius:999px;padding:6px 14px;font-size:0.85rem;text-decoration:none;box-shadow:0 4px 12px #000;">← Back</a>
    <div class="container">
        <h1>YOUTUBE</h1>
        <div class="subhead">video info & download</div>

        <label for="urlInput">YouTube Video URL</label>
        <input type="url" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." spellcheck="false" autofocus>

        <div id="videoInfo" class="video-info">
            <div class="video-title" id="videoTitle"></div>
            <div class="video-meta" id="videoMeta"></div>
            <div class="video-description" id="videoDescription"></div>
        </div>

        <button class="btn-primary" id="downloadBtn" disabled onclick="downloadVideo()">Download Video</button>

        <div class="status" id="status"></div>
    </div>

    <script>
        let debounceTimer = null;
        let currentUrl = '';
        let currentTitle = '';       // store the video title
        let currentExt = 'mp4';      // default extension, may be overridden by API

        const urlInput = document.getElementById('urlInput');
        const videoInfo = document.getElementById('videoInfo');
        const videoTitle = document.getElementById('videoTitle');
        const videoMeta = document.getElementById('videoMeta');
        const videoDescription = document.getElementById('videoDescription');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusEl = document.getElementById('status');

        urlInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            const url = this.value.trim();

            if (!url) {
                videoInfo.style.display = 'none';
                downloadBtn.disabled = true;
                currentUrl = '';
                statusEl.textContent = '';
                return;
            }

            debounceTimer = setTimeout(() => {
                fetchVideoInfo(url);
            }, 600);
        });

        urlInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                clearTimeout(debounceTimer);
                fetchVideoInfo(this.value.trim());
            }
        });

        async function fetchVideoInfo(url) {
            if (!url) return;

            showStatus('Fetching video info...', 'info');
            videoInfo.style.display = 'none';
            downloadBtn.disabled = true;
            currentUrl = '';

            try {
                const response = await fetch('/api/v0/youtube/info?url=' + encodeURIComponent(url));

                if (!response.ok) {
                    const errText = await response.text();
                    let errMsg;
                    try {
                        const errJson = JSON.parse(errText);
                        errMsg = errJson.error || errText;
                    } catch {
                        errMsg = errText || `Server error (${response.status})`;
                    }
                    throw new Error(errMsg);
                }

                const data = await response.json();

                displayVideoInfo(data, url);
                currentUrl = url;
                downloadBtn.disabled = false;
                showStatus('Video info loaded', 'success');
            } catch (err) {
                videoInfo.style.display = 'block';
                videoInfo.classList.add('error');
                videoTitle.textContent = 'Failed to load video info';
                videoMeta.innerHTML = '';
                videoDescription.textContent = err.message;
                showStatus('Error: ' + err.message, 'error');
            }
        }

        function displayVideoInfo(data, url) {
            videoInfo.classList.remove('error');
            videoInfo.style.display = 'block';

            // Store title and extension for later download
            currentTitle = data.title || 'video';
            // If your API returns the file extension (e.g., data.ext), use it; otherwise default to 'mp4'
            currentExt = data.ext || 'mp4';

            videoTitle.textContent = data.title || 'Unknown Title';

            const metaParts = [];

            if (data.duration) {
                const dur = data.duration;
                const minutes = Math.floor(dur / 60);
                const seconds = dur % 60;
                metaParts.push('<span>Duration: ' + minutes + ':' + String(seconds).padStart(2, '0') + '</span>');
            }

            if (data.view_count !== undefined) {
                metaParts.push('<span>Views: ' + Number(data.view_count).toLocaleString() + '</span>');
            }

            if (data.uploader) {
                metaParts.push('<span>Channel: ' + escapeHtml(data.uploader) + '</span>');
            }

            if (data.upload_date) {
                const d = data.upload_date;
                const dateStr = d.substring(0, 4) + '-' + d.substring(4, 6) + '-' + d.substring(6, 8);
                metaParts.push('<span>Uploaded: ' + dateStr + '</span>');
            }

            if (data.like_count !== undefined) {
                metaParts.push('<span>Likes: ' + Number(data.like_count).toLocaleString() + '</span>');
            }

            videoMeta.innerHTML = metaParts.join('');

            const desc = data.description || 'No description available.';
            videoDescription.textContent = desc;
        }

        function downloadVideo() {
            if (!currentUrl) {
                showStatus('No video URL to download', 'error');
                return;
            }

            // Sanitize the title for a safe filename
            const safeTitle = currentTitle
                .replace(/[\\/:\*\?"<>\|]/g, '_')   // replace forbidden characters with underscore
                .replace(/\s+/g, ' ')               // collapse multiple spaces
                .trim()
                .substring(0, 200);                 // limit length

            const filename = safeTitle + '.' + currentExt;
            const downloadUrl = '/api/v0/youtube/download?url=' + encodeURIComponent(currentUrl);

            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = filename;                  // this sets the suggested filename
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            showStatus('Download started...', 'success');
        }

        function showStatus(message, type) {
            statusEl.textContent = message;
            if (type === 'success') {
                statusEl.style.color = '#ffffff';
            } else if (type === 'error') {
                statusEl.style.color = '#ff8888';
            } else {
                statusEl.style.color = '#cccccc';
            }

            if (type !== 'info') {
                setTimeout(() => {
                    if (statusEl.textContent === message) {
                        statusEl.textContent = '';
                    }
                }, 5000);
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
