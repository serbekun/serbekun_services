<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>YouTube — Serbekun</title>
    <link rel="stylesheet" href="/static/v0/css/youtube.css">
</head>
<body>

    <div class="container">
        <a href="/" class="back-link">back</a>

        <div class="header">
            <h1 class="header-title">YouTube</h1>
            <p class="header-sub">// video info &amp; download</p>
        </div>

        <div class="prompt-line">
            <span class="cwd">~/serbekun/youtube</span>
            <span>$</span>
            <span>yt --info --download</span>
            <span class="prompt-cursor"></span>
        </div>

        <div class="field">
            <div class="field-label">video url</div>
            <input type="url" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." spellcheck="false" autofocus>
        </div>

        <div id="videoInfo" class="video-info">
            <div class="info-header">
                <span class="info-header-label" id="infoHeaderLabel">video info</span>
            </div>
            <div class="info-body">
                <div class="video-title" id="videoTitle"></div>
                <div class="video-meta" id="videoMeta"></div>
                <div class="video-description" id="videoDescription"></div>
            </div>
        </div>

        <button class="run-btn" id="downloadBtn" disabled onclick="downloadVideo()">download video</button>

        <div class="status-line" id="status"></div>

        <div class="footer">serbekun service // youtube tools</div>
    </div>

    <script src="/static/v0/js/youtube.js"></script>
</body>
</html>
