<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serbekun Service</title>
    <link rel="icon" href="/icon" type="image/svg+xml">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            background: #000;
            min-height: 100%;
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
            background: transparent;
            color: #c8c8c8;
            min-height: 100vh;
            padding: 3rem 1rem 4rem;
            line-height: 1.6;
        }

        /* ─── Header ─── */
        .header {
            max-width: 680px;
            margin: 0 auto 2.5rem;
            border-bottom: 1px solid #222;
            padding-bottom: 1.5rem;
        }

        .header-title {
            font-size: 1.6rem;
            font-weight: 500;
            color: #fff;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }

        .header-sub {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.12em;
        }

        /* ─── Prompt line ─── */
        .prompt-line {
            max-width: 680px;
            margin: 0 auto 2rem;
            font-size: 0.8rem;
            color: #555;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .prompt-line .cwd { color: #888; }

        .prompt-cursor {
            display: inline-block;
            width: 7px;
            height: 13px;
            background: #777;
            animation: blink 1.1s step-end infinite;
            vertical-align: -2px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* ─── Sections ─── */
        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        .section { margin-bottom: 2rem; }

        .section-label {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 10px;
            padding-left: 2px;
        }

        /* ─── Items ─── */
        .item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 11px 16px;
            background: #0b0b0b;
            border: 1px solid #1e1e1e;
            border-radius: 8px;
            margin-bottom: 6px;
            text-decoration: none;
            color: #c8c8c8;
            font-family: inherit;
            font-size: 0.88rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .item:hover {
            background: #111;
            border-color: #333;
            color: #fff;
        }

        .item-num {
            font-size: 0.7rem;
            color: #444;
            min-width: 18px;
        }

        .item-icon {
            font-size: 0.9rem;
            color: #666;
            width: 16px;
            text-align: center;
        }

        /* Simple inline SVG icons via data-icon attribute for pure HTML */
        .item-icon svg {
            width: 15px;
            height: 15px;
            stroke: #666;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            vertical-align: -2px;
            transition: stroke 0.15s;
        }

        .item:hover .item-icon svg { stroke: #999; }

        .item-name { flex: 1; letter-spacing: 0.02em; }

        .item-arrow {
            color: #333;
            font-size: 0.85rem;
            transition: color 0.15s;
        }

        .item:hover .item-arrow { color: #666; }

        /* ─── Footer ─── */
        .footer {
            max-width: 680px;
            margin: 3rem auto 0;
            padding-top: 1rem;
            border-top: 1px solid #1a1a1a;
            font-size: 0.72rem;
            color: #333;
            letter-spacing: 0.1em;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="header-title">Serbekun Services</h1>
        <p class="header-sub">// サービス一覧</p>
    </div>

    <div class="prompt-line">
        <span class="cwd">~/serbekun</span>
        <span>$</span>
        <span>ls -l services/</span>
        <span class="prompt-cursor"></span>
    </div>

    <div class="container">

        <!-- 03 Cipher -->
        <div class="section">
            <div class="section-label">03 — cipher</div>
            <a href="/static/v0/html/cipher_aes" class="item">
                <span class="item-num">01</span>
                <span class="item-icon">
                    <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                </span>
                <span class="item-name">AES cipher</span>
                <span class="item-arrow">→</span>
            </a>
        </div>

        <!-- 04 Links -->
        <div class="section">
            <div class="section-label">04 — links &amp; tools</div>
            <a href="/static/v0/html/links" class="item">
                <span class="item-num">01</span>
                <span class="item-icon">
                    <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                </span>
                <span class="item-name">Links Manager</span>
                <span class="item-arrow">→</span>
            </a>
            <a href="/static/v0/html/quiz_ui" class="item">
                <span class="item-num">02</span>
                <span class="item-icon">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="2.5"/></svg>
                </span>
                <span class="item-name">Quiz</span>
                <span class="item-arrow">→</span>
            </a>
        </div>

        <!-- 05 YouTube -->
        <div class="section">
            <div class="section-label">05 — youtube tools</div>
            <a href="/static/v0/html/youtube" class="item">
                <span class="item-num">01</span>
                <span class="item-icon">
                    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </span>
                <span class="item-name">YouTube Info &amp; Download</span>
                <span class="item-arrow">→</span>
            </a>
        </div>

    </div>

    <div class="footer">serbekun service // v0</div>

</body>
</html>
